name: Update Svgl React Component

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun i

      - name: Fetch data
        id: fetch
        run: bun fetch

      - name: Generate files
        if: steps.fetch.outputs.had_failures != 'true'
        run: bun generate

      - name: Format code
        if: steps.fetch.outputs.had_failures != 'true'
        run: bun format

      - name: Reset lockfile changes
        if: steps.fetch.outputs.had_failures != 'true'
        run: git checkout -- bun.lockb

      - name: Create Pull Request
        if: steps.fetch.outputs.had_failures != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update-svgl
          branch-suffix: timestamp
          base: main
          title: "chore: update svgl component"
          commit-message: "chore: update svgl component"
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
